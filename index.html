<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>El Monte de Palito</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
    }
    body {
      background: #1a2a1a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Fredoka', 'Courier New', monospace;
    }
    #game {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a2a1a;
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    canvas {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      box-shadow: 0 0 40px rgba(78, 138, 42, 0.4);
      image-rendering: auto;
      touch-action: none;
    }
    #footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 5px;
      color: #5D9E34;
      font-size: 11px;
      letter-spacing: 1px;
      text-align: center;
      pointer-events: none;
      z-index: 2;
    }
    @media (hover: none), (max-width: 820px) {
      #footer { display: none; }
      canvas { box-shadow: none; }
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <script type="module" src="/src/main.js"></script>
  <div id="footer">Feria de Ciencias 2026 · Escuela Domingo F. Sarmiento · Los Aromos · Cordoba</div>
</body>
</html>
